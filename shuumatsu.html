<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light" />
  <title>万物皆可周末愉快｜切片实验室</title>
  <style>
    :root{
      --bg:#f1f0eb;
      --paper:#faf9f5;
      --ink:#11110f;
      --muted:#77766f;
      --soft:#aaa9a2;
      --line:rgba(19,19,17,.11);
      --line-strong:rgba(19,19,17,.18);
      --glass:rgba(250,249,245,.66);
      --glass-strong:rgba(250,249,245,.88);
      --shadow:0 22px 70px rgba(22,22,18,.10),0 2px 10px rgba(22,22,18,.04);
      --safe-bottom:env(safe-area-inset-bottom,0px);
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      overflow:hidden;
      color:var(--ink);
      font-family:Inter,"SF Pro Display","PingFang SC","Microsoft YaHei",ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      -webkit-font-smoothing:antialiased;
      user-select:none;
      background:
        radial-gradient(42% 48% at 82% 2%,rgba(173,182,255,.16),transparent 70%),
        radial-gradient(36% 44% at 10% 94%,rgba(255,191,161,.13),transparent 72%),
        linear-gradient(180deg,#f7f6f2 0%,var(--bg) 100%);
    }
    body:before{
      content:"";position:fixed;inset:0;pointer-events:none;opacity:.24;
      background-image:linear-gradient(rgba(17,17,15,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(17,17,15,.025) 1px,transparent 1px);
      background-size:56px 56px;
      mask-image:linear-gradient(to bottom,black,transparent 78%);
    }
    button,input,select{font:inherit}
    button{border:0;color:inherit}
    button:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid rgba(17,17,15,.38);outline-offset:3px}
    .app{height:100%;display:grid;grid-template-rows:auto 1fr;position:relative}
    .topbar{height:78px;display:flex;align-items:center;justify-content:space-between;padding:16px 22px 12px;position:relative;z-index:30}
    .brand{display:flex;align-items:center;gap:11px;font-weight:680;letter-spacing:-.035em;white-space:nowrap}
    .brand-mark{width:30px;height:30px;border-radius:9px;border:1px solid var(--line-strong);background:rgba(255,255,255,.54);position:relative;box-shadow:inset 0 1px 0 rgba(255,255,255,.9)}
    .brand-mark:before,.brand-mark:after{content:"";position:absolute;top:7px;bottom:7px;background:#111;border-radius:999px}
    .brand-mark:before{left:7px;width:3px;box-shadow:6px 0 0 #111,12px 0 0 #111}
    .brand-mark:after{width:5px;height:5px;top:auto;bottom:4px;right:3px;border-radius:50%;background:#111}
    .brand span{font-size:14px}
    .mode-switch{position:absolute;left:50%;transform:translateX(-50%);display:flex;padding:4px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.46);box-shadow:0 8px 30px rgba(20,20,18,.04);backdrop-filter:blur(22px) saturate(140%);-webkit-backdrop-filter:blur(22px) saturate(140%)}
    .mode-switch button{min-width:68px;padding:9px 16px;border-radius:999px;background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:.18s ease}
    .mode-switch button.active{background:#111;color:#fff;box-shadow:0 6px 15px rgba(0,0,0,.16)}
    .top-actions{display:flex;gap:9px;align-items:center}
    .pill{min-height:42px;padding:0 17px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.52);font-size:12px;cursor:pointer;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);transition:transform .16s ease,background .16s ease,box-shadow .16s ease}
    .pill:hover{transform:translateY(-1px);background:rgba(255,255,255,.88);box-shadow:0 8px 22px rgba(20,20,18,.07)}
    .pill:active{transform:none}
    .pill.primary{background:#111;color:#fff;border-color:#111;padding-inline:20px}.pill.primary:hover{background:#292925}
    .workspace{min-height:0;position:relative;padding:0 18px 18px;display:grid;grid-template-rows:1fr auto;gap:12px}
    .stage{min-height:0;position:relative;border:1px solid rgba(20,20,18,.08);border-radius:34px;background:rgba(255,255,255,.31);overflow:hidden;box-shadow:inset 0 1px 0 rgba(255,255,255,.95),0 18px 70px rgba(20,20,18,.035)}
    .stage:before{content:"";position:absolute;inset:-18%;pointer-events:none;background:radial-gradient(circle at 50% 45%,rgba(255,255,255,.97),rgba(255,255,255,.16) 44%,transparent 70%);filter:blur(26px)}
    .stage:after{content:"";position:absolute;inset:13px;border:1px solid rgba(255,255,255,.7);border-radius:25px;pointer-events:none}
    .canvas-wrap{position:absolute;inset:26px 26px 28px;display:flex;align-items:center;justify-content:center;min-width:0;min-height:0}
    #previewCanvas{display:none;max-width:100%;max-height:100%;width:auto;height:auto;box-shadow:0 22px 70px rgba(24,24,20,.15);background:transparent;touch-action:none;border-radius:2px}
    #previewCanvas.protecting{cursor:none}
    #previewCanvas.rect-tool{cursor:crosshair}
    .empty-state{position:relative;z-index:2;width:min(560px,86%);aspect-ratio:1.45;border:1px solid rgba(20,20,18,.12);border-radius:30px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(255,255,255,.38);box-shadow:inset 0 1px 0 rgba(255,255,255,.9);backdrop-filter:blur(28px) saturate(125%);-webkit-backdrop-filter:blur(28px) saturate(125%);cursor:pointer;transition:.22s ease}
    .empty-state:hover,.empty-state.drag{background:rgba(255,255,255,.68);transform:translateY(-3px);box-shadow:0 18px 50px rgba(20,20,18,.07)}
    .empty-icon{width:58px;height:58px;border-radius:18px;background:#111;color:#fff;display:grid;place-items:center;font-size:27px;font-weight:250;box-shadow:0 12px 28px rgba(0,0,0,.16)}
    .empty-state strong{font-size:18px;letter-spacing:-.035em}.empty-state span{font-size:11px;color:var(--muted);letter-spacing:.04em}
    .hud{position:absolute;left:20px;top:20px;display:flex;gap:7px;z-index:6}.hud-chip{padding:8px 11px;border-radius:999px;background:rgba(255,255,255,.64);border:1px solid var(--line);font-size:10px;color:#595852;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
    .brush-cursor{position:fixed;z-index:80;border:1.5px solid rgba(17,17,15,.82);border-radius:50%;pointer-events:none;display:none;transform:translate(-50%,-50%);box-shadow:0 0 0 1px rgba(255,255,255,.78)}
    .protect-bar{position:absolute;z-index:20;left:50%;top:17px;transform:translateX(-50%);display:none;align-items:center;gap:7px;padding:7px;border:1px solid var(--line);border-radius:17px;background:rgba(248,247,243,.82);box-shadow:var(--shadow);backdrop-filter:blur(28px) saturate(135%);-webkit-backdrop-filter:blur(28px) saturate(135%)}
    .protect-bar.open{display:flex}
    .protect-note{position:absolute;z-index:19;left:50%;top:76px;transform:translateX(-50%);display:none;padding:8px 12px;border-radius:999px;background:rgba(17,17,15,.84);color:#fff;font-size:10px;white-space:nowrap;box-shadow:0 8px 25px rgba(0,0,0,.14)}.protect-note.open{display:block}
    .mini-btn{height:35px;padding:0 13px;border-radius:11px;border:1px solid transparent;background:transparent;font-size:11px;color:#63625c;cursor:pointer;transition:.16s}.mini-btn:hover{background:rgba(255,255,255,.7)}.mini-btn.active{background:#111;color:#fff;border-color:#111;box-shadow:0 6px 15px rgba(0,0,0,.13)}
    .toolbar-divider{width:1px;height:22px;background:var(--line);margin:0 2px}
    .brush-control{display:flex;align-items:center;gap:8px;padding:0 4px 0 7px;font-size:10px;color:#66655f}.brush-control input{width:82px}
    .controls{position:relative;z-index:12;border:1px solid var(--line);border-radius:26px;background:var(--glass);box-shadow:var(--shadow);backdrop-filter:blur(32px) saturate(135%);-webkit-backdrop-filter:blur(32px) saturate(135%);padding:15px 17px;display:grid;grid-template-columns:repeat(4,minmax(120px,1fr)) auto;gap:16px;align-items:end}
    .control{min-width:0}.control-head{display:flex;justify-content:space-between;gap:8px;margin-bottom:8px;font-size:10px;color:#65645e}.value{font-variant-numeric:tabular-nums;color:#111;font-weight:560}
    input[type="range"]{width:100%;appearance:none;height:3px;background:rgba(17,17,15,.14);border-radius:99px;outline:none}
    input[type="range"]::-webkit-slider-thumb{appearance:none;width:15px;height:15px;border-radius:50%;background:#111;box-shadow:0 0 0 4px rgba(255,255,255,.86),0 3px 9px rgba(0,0,0,.14);cursor:pointer}
    input[type="range"]::-moz-range-thumb{width:15px;height:15px;border:0;border-radius:50%;background:#111;box-shadow:0 0 0 4px rgba(255,255,255,.86);cursor:pointer}
    .control-actions{display:flex;gap:7px;align-items:center}.icon-btn{width:42px;height:42px;border-radius:13px;border:1px solid var(--line);background:rgba(255,255,255,.51);display:grid;place-items:center;cursor:pointer;transition:.16s ease;font-size:14px}.icon-btn:hover{background:#fff;transform:translateY(-1px);box-shadow:0 8px 20px rgba(20,20,18,.07)}.icon-btn.active{background:#111;color:#fff;border-color:#111}
    .advanced{position:absolute;right:18px;bottom:106px;width:min(480px,calc(100vw - 36px));z-index:24;border:1px solid var(--line);border-radius:25px;background:var(--glass-strong);box-shadow:var(--shadow);backdrop-filter:blur(36px) saturate(135%);-webkit-backdrop-filter:blur(36px) saturate(135%);padding:18px;display:none}.advanced.open{display:block}
    .advanced-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}.advanced-title strong{font-size:13px;letter-spacing:-.02em}.advanced-title span{font-size:10px;color:var(--muted)}
    .advanced-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}.select-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:15px}
    select{width:100%;height:41px;border:1px solid var(--line);border-radius:13px;background:rgba(255,255,255,.72);padding:0 11px;color:#111;font-size:11px}
    .helper{font-size:10px;line-height:1.65;color:var(--muted);margin:14px 0 0}.mobile-sheet-handle{display:none}
    .toast{position:fixed;left:50%;bottom:24px;transform:translate(-50%,20px);opacity:0;z-index:100;background:#111;color:#fff;padding:11px 16px;border-radius:999px;font-size:11px;transition:.22s;pointer-events:none;box-shadow:0 12px 32px rgba(0,0,0,.16)}.toast.show{opacity:1;transform:translate(-50%,0)}
    .modal{position:fixed;inset:0;z-index:90;background:rgba(19,19,17,.20);display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(13px);-webkit-backdrop-filter:blur(13px)}.modal.open{display:flex}
    .modal-card{width:min(470px,100%);border-radius:29px;border:1px solid var(--line);background:rgba(250,249,245,.95);box-shadow:0 30px 90px rgba(0,0,0,.17);padding:22px}.modal-title{font-size:25px;letter-spacing:-.045em;margin:0 0 6px}.modal-sub{font-size:11px;color:var(--muted);margin:0 0 18px}.export-options{display:grid;grid-template-columns:1fr 1fr;gap:12px}.export-card{border:1px solid var(--line);border-radius:19px;padding:15px;background:rgba(255,255,255,.58);cursor:pointer;text-align:left;transition:.18s}.export-card:hover{background:#fff;transform:translateY(-2px);box-shadow:0 12px 24px rgba(20,20,18,.06)}.export-card strong{display:block;margin-bottom:5px;font-size:13px}.export-card span{font-size:10px;color:var(--muted)}
    .progress-wrap{display:none;margin-top:16px}.progress-wrap.show{display:block}.progress-track{height:7px;border-radius:99px;background:rgba(17,17,15,.11);overflow:hidden}.progress-bar{height:100%;width:0;background:#111;border-radius:99px;transition:width .12s linear}.progress-text{font-size:10px;color:var(--muted);margin-top:8px;display:flex;justify-content:space-between}.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}.hidden{display:none!important}
    @media (max-width:900px){
      .topbar{height:66px;padding:10px 12px}.brand{gap:8px}.brand-mark{width:27px;height:27px}.brand span{font-size:12px}.mode-switch{position:static;transform:none;margin-left:auto}.mode-switch button{min-width:auto;padding:8px 11px}.top-actions .pill:not(.primary){display:none}.top-actions{margin-left:8px}.pill.primary{padding:0 13px}.workspace{padding:0 9px 9px;gap:8px}.canvas-wrap{inset:12px 12px 82px}.stage{border-radius:25px}.stage:after{inset:8px;border-radius:19px}
      .controls{grid-template-columns:1fr 1fr;gap:14px;padding:19px 16px calc(16px + var(--safe-bottom));border-radius:25px 25px 0 0;position:fixed;left:0;right:0;bottom:0;transform:translateY(calc(100% - 72px));transition:transform .25s ease;max-height:66vh;overflow:auto}.controls.open{transform:translateY(0)}
      .mobile-sheet-handle{display:flex;grid-column:1/-1;align-items:center;justify-content:space-between;cursor:pointer;margin:-8px 0 2px;font-size:11px;color:#555}.mobile-sheet-handle:before{content:"";position:absolute;top:7px;left:50%;width:40px;height:4px;border-radius:99px;background:rgba(17,17,15,.15);transform:translateX(-50%)}
      .control-actions{grid-column:1/-1;justify-content:center}.advanced{position:fixed;left:9px;right:9px;bottom:82px;width:auto;max-height:60vh;overflow:auto}.protect-bar{top:auto;bottom:88px;max-width:calc(100% - 18px);overflow-x:auto;justify-content:flex-start;border-radius:16px}.protect-note{top:auto;bottom:145px}.brush-control input{width:68px}.export-options{grid-template-columns:1fr}
    }
    @media (max-width:590px){.brand span{max-width:145px;overflow:hidden;text-overflow:ellipsis}.mode-switch button{padding:8px 9px}.top-actions{margin-left:5px}.advanced-grid{grid-template-columns:1fr}.protect-note{white-space:normal;text-align:center;width:max-content;max-width:calc(100% - 36px)}.toolbar-divider{display:none}.protect-bar{gap:4px}.mini-btn{padding:0 10px}.brush-control{display:none}}
    @media (max-width:390px){.brand span{max-width:108px}.mode-switch{display:none}}
    @media (prefers-reduced-motion:reduce){*,*:before,*:after{scroll-behavior:auto!important;transition-duration:.01ms!important;animation-duration:.01ms!important}}
  </style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand"><div class="brand-mark"></div><span>万物皆可周末愉快</span></div>
    <div class="mode-switch" aria-label="模式">
      <button id="imageMode" class="active">静态</button>
      <button id="motionMode">动态</button>
    </div>
    <div class="top-actions">
      <button class="pill" id="openBtn">导入</button>
      <button class="pill primary" id="exportBtn">导出</button>
    </div>
  </header>

  <main class="workspace">
    <section class="stage" id="stage">
      <div class="hud hidden" id="hud">
        <div class="hud-chip" id="sizeChip">0 × 0</div>
        <div class="hud-chip" id="seedChip">种子 000000</div>
      </div>

      <div class="protect-bar" id="protectBar">
        <button class="mini-btn active" id="paintBtn">画笔</button>
        <button class="mini-btn" id="rectBtn">框选</button>
        <button class="mini-btn" id="eraseBtn">擦除</button>
        <div class="toolbar-divider"></div>
        <label class="brush-control">笔刷 <input id="brushSize" type="range" min="2" max="30" value="10" /></label>
        <button class="mini-btn" id="clearMaskBtn">清空</button>
        <button class="mini-btn active" id="doneProtectBtn">完成</button>
      </div>
      <div class="protect-note" id="protectNote">涂抹需要保持原样的区域</div>

      <div class="canvas-wrap">
        <canvas id="previewCanvas"></canvas>
        <div class="empty-state" id="emptyState" tabindex="0" role="button" aria-label="导入图片">
          <div class="empty-icon">＋</div>
          <strong>导入一张图片</strong>
          <span>点击选择或拖入 · PNG / JPG / WebP</span>
        </div>
      </div>
    </section>

    <section class="controls" id="controls">
      <div class="mobile-sheet-handle" id="sheetHandle"><span>参数控制</span><span id="sheetArrow">↑</span></div>
      <div class="control"><div class="control-head"><span>切片数量</span><span class="value" id="slicesVal">110</span></div><input id="slices" type="range" min="10" max="320" value="110" /></div>
      <div class="control"><div class="control-head"><span>错位强度</span><span class="value" id="shiftVal">38</span></div><input id="shift" type="range" min="0" max="100" value="38" /></div>
      <div class="control"><div class="control-head"><span>宽度变化</span><span class="value" id="widthMixVal">66</span></div><input id="widthMix" type="range" min="0" max="100" value="66" /></div>
      <div class="control"><div class="control-head"><span>纵向分段</span><span class="value" id="splitVal">54</span></div><input id="split" type="range" min="0" max="100" value="54" /></div>
      <div class="control-actions">
        <button class="icon-btn" id="randomBtn" title="随机效果">↻</button>
        <button class="icon-btn" id="compareBtn" title="按住查看原图">◐</button>
        <button class="icon-btn" id="playBtn" title="播放或暂停">▶</button>
        <button class="icon-btn" id="protectBtn" title="保护选区">▣</button>
        <button class="icon-btn" id="advancedBtn" title="更多参数">•••</button>
      </div>
    </section>
  </main>
</div>

<aside class="advanced" id="advancedPanel">
  <div class="advanced-title"><strong>更多参数</strong><span>精细控制</span></div>
  <div class="advanced-grid">
    <div class="control"><div class="control-head"><span>左右错位</span><span class="value" id="sideShiftVal">12</span></div><input id="sideShift" type="range" min="0" max="60" value="12" /></div>
    <div class="control"><div class="control-head"><span>纵向拉伸</span><span class="value" id="stretchVal">24</span></div><input id="stretch" type="range" min="0" max="100" value="24" /></div>
    <div class="control"><div class="control-head"><span>细线密度</span><span class="value" id="thinLinesVal">38</span></div><input id="thinLines" type="range" min="0" max="100" value="38" /></div>
    <div class="control"><div class="control-head"><span>动态幅度</span><span class="value" id="motionAmountVal">34</span></div><input id="motionAmount" type="range" min="0" max="100" value="34" /></div>
    <div class="control"><div class="control-head"><span>视频时长</span><span class="value" id="durationVal">4s</span></div><input id="duration" type="range" min="1" max="10" value="4" /></div>
  </div>
  <div class="select-row">
    <label><div class="control-head"><span>运动方式</span></div><select id="motionType"><option value="breathe">呼吸</option><option value="wave">波浪</option><option value="jump">跳变</option></select></label>
    <label><div class="control-head"><span>FPS</span></div><select id="fps"><option>24</option><option selected>30</option><option>60</option></select></label>
  </div>
  <p class="helper">进入“保护选区”后，可用画笔涂抹，也可拖出矩形选框。被覆盖的脸、文字、Logo 或其他区域会在静态和动态导出中保持原样。</p>
</aside>

<input id="fileInput" type="file" accept="image/png,image/jpeg,image/webp" hidden />
<canvas id="exportCanvas" hidden></canvas>
<canvas id="maskCanvas" hidden></canvas>
<canvas id="layerCanvas" hidden></canvas>
<div class="brush-cursor" id="brushCursor"></div>
<div class="toast" id="toast"></div>

<div class="modal" id="exportModal">
  <div class="modal-card">
    <h2 class="modal-title">导出作品</h2>
    <p class="modal-sub" id="exportMeta">原始尺寸</p>
    <div class="export-options">
      <button class="export-card" id="exportPng"><strong>PNG 图片</strong><span>无损 · 保持原始像素尺寸</span></button>
      <button class="export-card" id="exportVideo"><strong>动态视频</strong><span id="videoLabel">根据浏览器导出 WebM 或 MP4</span></button>
    </div>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
      <div class="progress-text"><span id="progressText">正在准备…</span><span id="progressPct">0%</span></div>
    </div>
    <div class="modal-actions"><button class="pill" id="cancelExport">关闭</button></div>
  </div>
</div>

<script>
(() => {
  'use strict';

  const $ = id => document.getElementById(id);
  const clamp = (v,a,b) => Math.max(a,Math.min(b,v));
  const previewCanvas = $('previewCanvas');
  const pctx = previewCanvas.getContext('2d',{alpha:true,desynchronized:true});
  const exportCanvas = $('exportCanvas');
  const ectx = exportCanvas.getContext('2d',{alpha:true});
  const maskCanvas = $('maskCanvas');
  const maskCtx = maskCanvas.getContext('2d',{alpha:true});
  const layerCanvas = $('layerCanvas');
  const layerCtx = layerCanvas.getContext('2d',{alpha:true});

  const state = {
    image:null,
    fileName:'万物皆可周末愉快',
    slices:110,
    shift:38,
    widthMix:66,
    split:54,
    sideShift:12,
    stretch:24,
    thinLines:38,
    duration:4,
    motionAmount:34,
    motionType:'breathe',
    fps:30,
    brushSize:10,
    seed:Math.floor(Math.random()*1e9),
    mode:'image',
    playing:false,
    compare:false,
    segments:[],
    lineSegments:[],
    protectMode:false,
    protectTool:'paint',
    painting:false,
    selecting:false,
    rectStart:null,
    rectCurrent:null,
    lastPaint:null,
    hasMask:false,
    raf:0,
    startTime:performance.now(),
    exporting:false,
    abortExport:false
  };

  const sliderIds=['slices','shift','widthMix','split','sideShift','stretch','thinLines','motionAmount','duration'];
  const nonStructural=new Set(['motionAmount','duration']);

  function mulberry32(seed){let a=seed>>>0;return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
  function hash(n){const x=Math.sin(n*12.9898+78.233)*43758.5453;return x-Math.floor(x)}

  function saveSettings(){

  function buildSegments(){
    if(!state.image)return;
    const W=state.image.naturalWidth,H=state.image.naturalHeight;
    const rand=mulberry32(state.seed);
    const count=Math.max(10,Math.round(state.slices));
    const avg=W/count;
    const mix=state.widthMix/100;
    const weights=[];let sum=0;
    for(let i=0;i<count;i++){
      const raw=.12+Math.pow(rand(),2.15)*3.2;
      const w=avg*((1-mix)+mix*raw);
      weights.push(w);sum+=w;
    }
    const segments=[];
    let x=0;
    for(let i=0;i<count;i++){
      let sw=(i===count-1)?W-x:weights[i]/sum*W;
      sw=Math.max(.5,sw);
      const splitPower=state.split/100;
      const segCount=1+Math.floor(rand()*(1+splitPower*5));
      let y=0;
      for(let s=0;s<segCount;s++){
        const remaining=H-y;
        if(remaining<=1)break;
        const slots=segCount-s;
        const base=remaining/slots;
        const sh=(s===segCount-1)?remaining:clamp(base*(.42+rand()*1.28),2,remaining-(slots-1)*2);
        const local=(.26+rand()*.74)*(state.shift/100);
        const dy=(rand()<.5?-1:1)*H*(.012+rand()*.20)*local;
        const dx=(rand()-.5)*2*W*.045*(state.sideShift/60)*local;
        const sampleScale=clamp(1+(rand()-.5)*1.3*(state.stretch/100)*local,.45,1.9);
        segments.push({x,y,w:sw+.35,h:sh+.3,dx,dy,sampleScale,phase:rand()*Math.PI*2,speed:.55+rand()*1.7,key:Math.floor(rand()*1e7)});
        y+=sh;
      }
      x+=sw;
    }

    const lineSegments=[];
    const lineCount=Math.floor(count*(state.thinLines/100)*.95);
    for(let i=0;i<lineCount;i++){
      const lw=Math.max(.55,W*(.00035+rand()*.0025));
      const lx=rand()*(W-lw);
      const lh=H*(.22+rand()*.78);
      const ly=rand()*(H-lh);
      const local=(.34+rand()*.66)*(state.shift/100);
      lineSegments.push({x:lx,y:ly,w:lw,h:lh,dx:(rand()-.5)*W*.08*local,dy:(rand()-.5)*H*.42*local,sampleScale:clamp(1+(rand()-.5)*1.8*(state.stretch/100)*local,.35,2.2),phase:rand()*Math.PI*2,speed:.8+rand()*2.1,key:Math.floor(rand()*1e7),alpha:.78+rand()*.22});
    }
    state.segments=segments;
    state.lineSegments=lineSegments;
  }

  function motionValue(seg,t){

    const ease=frac<.12?frac/.12:frac>.84?(1-frac)/.16:1;
    return a*(1-ease)+b*Math.max(0,1-ease);
  }

  function drawMappedSegment(ctx,canvas,seg,t,alpha=1){

    const y=Math.min(state.rectStart.y,state.rectCurrent.y)*sy;

  function renderTo(ctx,canvas,t=0,original=false,showMask=false){

    applyProtectedArea(ctx,canvas);
    if(showMask)drawMaskOverlay(ctx,canvas);
    if(showMask)drawSelectionPreview(ctx,canvas);
    ctx.restore();
  }

  function resizePreview(){

    previewCanvas.width=Math.max(1,Math.floor(cssW*dpr));previewCanvas.height=Math.max(1,Math.floor(cssH*dpr));
    drawPreview();
  }

  function drawPreview(ts=performance.now()){

  function loop(ts){if(state.playing&&state.image){drawPreview(ts);state.raf=requestAnimationFrame(loop)}else cancelAnimationFrame(state.raf)}

  function pickMime(){const types=['video/mp4;codecs=avc1.42E01E','video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'];return types.find(t=>window.MediaRecorder&&MediaRecorder.isTypeSupported(t))||''}
  async function exportVideo(){
    if(!state.image||state.exporting)return;
    if(!window.MediaRecorder||!exportCanvas.captureStream){showToast('当前浏览器不支持视频导出');return}
    const mime=pickMime();state.exporting=true;state.abortExport=false;$('progressWrap').classList.add('show');$('cancelExport').textContent='取消';
    const maxPixels=innerWidth<900?2200000:5000000,iw=state.image.naturalWidth,ih=state.image.naturalHeight;
    const scale=Math.min(1,Math.sqrt(maxPixels/(iw*ih)));
    exportCanvas.width=Math.max(2,Math.floor(iw*scale/2)*2);exportCanvas.height=Math.max(2,Math.floor(ih*scale/2)*2);
    const fps=state.fps,total=Math.max(1,Math.round(fps*state.duration)),stream=exportCanvas.captureStream(fps),chunks=[];
    let recorder;try{recorder=new MediaRecorder(stream,{mimeType:mime||undefined,videoBitsPerSecond:Math.min(18000000,Math.max(6000000,exportCanvas.width*exportCanvas.height*fps*.08))})}catch(e){recorder=new MediaRecorder(stream)}

    setTimeout(()=>{state.exporting=false;state.abortExport=false;$('progressWrap').classList.remove('show');$('cancelExport').textContent='关闭';setProgress(0,'正在准备…')},650);
  }

  function enterProtect(){

  $('exportPng').addEventListener('click',exportPNG);$('exportVideo').addEventListener('click',exportVideo);
  $('cancelExport').addEventListener('click',()=>{if(state.exporting){state.abortExport=true;$('progressText').textContent='正在取消…'}else $('exportModal').classList.remove('open')});
  $('exportModal').addEventListener('click',e=>{if(e.target===$('exportModal')&&!state.exporting)$('exportModal').classList.remove('open')});

  window.addEventListener('resize',()=>{clearTimeout(window.__resizeTimer);window.__resizeTimer=setTimeout(resizePreview,80)});
  window.addEventListener('beforeunload',e=>{if(state.image){e.preventDefault();e.returnValue=''}});
  window.addEventListener('keydown',e=>{
    if(e.code==='Space'&&document.activeElement.tagName!=='INPUT'&&document.activeElement.tagName!=='SELECT'){e.preventDefault();$('playBtn').click()}
    if((e.key==='r'||e.key==='R')&&state.image)randomize(true);
    if(e.key==='Escape'){if(state.protectMode)leaveProtect();$('advancedPanel').classList.remove('open');if(!state.exporting)$('exportModal').classList.remove('open')}
  });

  if(!pickMime())$('videoLabel').textContent='当前浏览器支持时导出 WebM';
})();
</script>
</body>
</html>
